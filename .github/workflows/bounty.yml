name: GO bounty tracker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    concurrency:
      group: go-bounty-tracker
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Check for new bounties
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python go_bounty_tracker.py --once

      - name: Persist seen state
        run: |
          if [[ -n "$(git status --porcelain seen_bounties.json)" ]]; then
            git config user.name "bounty-bot"
            git config user.email "bot@users.noreply.github.com"
            git add seen_bounties.json
            git commit -m "update seen bounties"
            git push
          else
            echo "No change to seen_bounties.json"
          fi
